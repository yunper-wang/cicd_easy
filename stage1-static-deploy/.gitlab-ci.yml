# Stage 1: 静态页面自动部署
# 流程: build → publish → deploy（Argo CD 自动检测 Git 变更并同步）
# 使用 Kaniko 在集群内构建镜像，无需 Docker daemon

stages:
  - build
  - publish
  - deploy

variables:
  # GitLab 内置变量：CI_REGISTRY = GitLab Container Registry 地址
  IMAGE_NAME: "${CI_REGISTRY}/root/cicd-demo/stage1"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

# ── Stage 1-1: 构建并推送镜像 ───────────────────────────
build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  script:
    # Kaniko 构建镜像并推送到 GitLab Registry
    # 为什么用 Kaniko：不需要 Docker daemon，安全性更高
    - echo "Building image ${IMAGE_NAME}:${IMAGE_TAG}"
    - /kaniko/executor
        --dockerfile="${CI_PROJECT_DIR}/stage1-static-deploy/Dockerfile"
        --context="${CI_PROJECT_DIR}/stage1-static-deploy"
        --destination="${IMAGE_NAME}:${IMAGE_TAG}"
        --destination="${IMAGE_NAME}:latest"
        --cache=true
        --cache-repo="${CI_REGISTRY}/root/cicd-demo/cache"
  only:
    changes:
      - stage1-static-deploy/**/*

# ── Stage 1-2: 更新 K8s 部署配置 ────────────────────────
update-manifest:
  stage: publish
  image: alpine:latest
  script:
    # 将新镜像 tag 写入 deployment.yaml
    # 为什么用 sed：简单直接，不需要额外工具
    - sed -i "s|image:.*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g"
        stage1-static-deploy/k8s/deployment.yaml
    # 提交并推送变更，Argo CD 会自动检测
    - cd "${CI_PROJECT_DIR}"
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.local"
    - git add stage1-static-deploy/k8s/deployment.yaml
    - git commit -m "chore: update stage1 image to ${IMAGE_TAG}"
    - git push "https://root:${CI_JOB_TOKEN}@gitlab.local/${CI_PROJECT_PATH}.git" HEAD:main
  only:
    changes:
      - stage1-static-deploy/**/*
  dependencies:
    - build-and-push

# ── Stage 1-3: Argo CD 自动部署 ─────────────────────────
# 注意：此 stage 仅为可视化完整性，实际部署由 Argo CD 自动完成
# Argo CD 检测到 Git 仓库的 deployment.yaml 变更后会自动同步
deploy-info:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Argo CD will auto-sync the new deployment"
    - echo "Image: ${IMAGE_NAME}:${IMAGE_TAG}"
    - echo "Monitor at: https://argocd.local"
  only:
    changes:
      - stage1-static-deploy/**/*

