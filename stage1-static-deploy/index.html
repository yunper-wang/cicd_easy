<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD GitOps Demo - Stage 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .stage-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .info {
            background: rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .version {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CI/CD GitOps Demo</h1>
        <div class="stage-badge">Stage 1 - Static Auto Deploy</div>
        <div class="info">
            <p>This page is deployed via GitLab CI + Argo CD GitOps workflow.</p>
            <p>Flow: Git Push → GitLab CI Build → Registry Push → Argo CD Auto Sync</p>
        </div>
        <div class="version">Version: v1.0.0 | Build: #1</div>
    </div>
</body>
</html>
