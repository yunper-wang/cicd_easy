<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD GitOps Demo - Stage 3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .stage-badge {
            display: inline-block; background: rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem; border-radius: 2rem; font-size: 1rem;
            margin-bottom: 1.5rem; backdrop-filter: blur(10px);
        }
        .canary-bar {
            width: 80%; max-width: 400px; margin: 1rem auto;
            background: rgba(255,255,255,0.2); border-radius: 2rem;
            height: 2rem; overflow: hidden; position: relative;
        }
        .canary-fill {
            height: 100%; background: rgba(255,255,255,0.5);
            border-radius: 2rem; transition: width 1s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: bold;
        }
        .info {
            background: rgba(255,255,255,0.1); border-radius: 1rem;
            padding: 1.5rem 2rem; backdrop-filter: blur(10px);
            font-size: 0.9rem; line-height: 1.8;
        }
        .version { margin-top: 1rem; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CI/CD GitOps Demo</h1>
        <div class="stage-badge">Stage 3 - Canary Deployment</div>
        <div class="canary-bar">
            <div class="canary-fill" style="width: 100%">100% Traffic</div>
        </div>
        <div class="info">
            <p>Deployed via Argo Rollouts with progressive Canary strategy.</p>
            <p>Traffic: Stable 0% → Canary 20% → 40% → 60% → 100%</p>
            <p>Auto-rollback on error rate > 5% or latency > 500ms</p>
        </div>
        <div class="version">Version: v1.0.0 | Slot: <span id="slot">stable</span></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const slot = params.get('slot') || 'stable';
        document.getElementById('slot').textContent = slot;
        if (slot === 'canary') {
            document.querySelector('.canary-fill').style.width = '20%';
        }
    </script>
</body>
</html>
