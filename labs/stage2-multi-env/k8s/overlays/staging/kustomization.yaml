# Stage 2 Staging Overlay —— 预发布环境配置
# 特点: 2 副本，标准资源，模拟生产配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -staging
namespace: staging
commonLabels:
  env: staging
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stage2-app
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: web
                env:
                  - name: ENV_NAME
                    value: "staging"
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "200m"
                    memory: "128Mi"
