# Stage 2 Base Deployment —— 所有环境共享的基础配置
# 环境差异通过 Kustomize overlay 覆盖
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stage2-app
  labels:
    app: stage2-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stage2-app
  template:
    metadata:
      labels:
        app: stage2-app
    spec:
      containers:
        - name: web
          image: gitlab.local:5050/root/cicd-demo/stage2:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          # 环境变量 —— 由 overlay 覆盖
          env:
            - name: ENV_NAME
              value: "base"
