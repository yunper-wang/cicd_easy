# Stage 2: 多环境发布（dev / staging / prod）
# 流程: build → deploy:dev → deploy:staging → deploy:prod（手动门控）
# 核心变化: Kustomize 管理 3 套环境配置 + prod 环境需手动触发

stages:
  - prepare
  - build
  - deploy:dev
  - deploy:staging
  - deploy:prod

variables:
  IMAGE_NAME: "${CI_REGISTRY}/root/cicd-demo/stage2"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"

# ── 准备环境变量 ──────────────────────────────────────
# 参考 generate-env.sh 模式：从 GitLab CI 文件类型变量生成环境配置
# 配置方法：GitLab → Settings → CI/CD → Variables → 添加 File 类型变量
#   DEV_ENV_FILE  = dev 环境的 .env 内容
#   PROD_ENV_FILE = prod 环境的 .env 内容
prepare:env:
  stage: prepare
  image: alpine:latest
  script:
    - echo "Preparing environment configurations..."
    - mkdir -p envs
    # 从 GitLab CI 文件类型变量生成 .env 文件
    # 文件类型变量会自动创建为临时文件，路径存储在同名变量中
    - if [ -n "${DEV_ENV_FILE}" ]; then cp "${DEV_ENV_FILE}" envs/.env.dev; fi
    - if [ -n "${PROD_ENV_FILE}" ]; then cp "${PROD_ENV_FILE}" envs/.env.prod; fi
    - echo "Environment files prepared"
    - ls -la envs/ || true
  artifacts:
    paths:
      - envs/
    expire_in: 1 hour
  only:
    changes:
      - stage2-multi-env/**/*

# ── 构建镜像 ──────────────────────────────────────────
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: [""]
  script:
    - /kaniko/executor
        --dockerfile="${CI_PROJECT_DIR}/stage2-multi-env/Dockerfile"
        --context="${CI_PROJECT_DIR}/stage2-multi-env"
        --destination="${IMAGE_NAME}:${IMAGE_TAG}"
        --destination="${IMAGE_NAME}:latest"
        --cache=true
        --cache-repo="${CI_REGISTRY}/root/cicd-demo/cache"
  only:
    changes:
      - stage2-multi-env/**/*

# ── 部署到 dev 环境（自动） ──────────────────────────
deploy:dev:
  stage: deploy:dev
  image: alpine:latest
  script:
    - sed -i "s|image:.*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g"
        stage2-multi-env/k8s/overlays/dev/kustomization.yaml
    - cd "${CI_PROJECT_DIR}"
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.local"
    - git add stage2-multi-env/k8s/overlays/dev/kustomization.yaml
    - git commit -m "chore(dev): update stage2 image to ${IMAGE_TAG}"
    - git push "https://root:${CI_JOB_TOKEN}@gitlab.local/${CI_PROJECT_PATH}.git" HEAD:main
  only:
    changes:
      - stage2-multi-env/**/*
    refs:
      - main
      - develop

# ── 部署到 staging 环境（自动） ───────────────────────
deploy:staging:
  stage: deploy:staging
  image: alpine:latest
  script:
    - sed -i "s|image:.*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g"
        stage2-multi-env/k8s/overlays/staging/kustomization.yaml
    - cd "${CI_PROJECT_DIR}"
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.local"
    - git add stage2-multi-env/k8s/overlays/staging/kustomization.yaml
    - git commit -m "chore(staging): update stage2 image to ${IMAGE_TAG}"
    - git push "https://root:${CI_JOB_TOKEN}@gitlab.local/${CI_PROJECT_PATH}.git" HEAD:main
  only:
    changes:
      - stage2-multi-env/**/*
    refs:
      - main

# ── 部署到 prod 环境（手动门控） ──────────────────────
# 关键: when: manual —— 需要在 GitLab UI 手动点击才会执行
deploy:prod:
  stage: deploy:prod
  image: alpine:latest
  script:
    - sed -i "s|image:.*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g"
        stage2-multi-env/k8s/overlays/prod/kustomization.yaml
    - cd "${CI_PROJECT_DIR}"
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.local"
    - git add stage2-multi-env/k8s/overlays/prod/kustomization.yaml
    - git commit -m "chore(prod): update stage2 image to ${IMAGE_TAG}"
    - git push "https://root:${CI_JOB_TOKEN}@gitlab.local/${CI_PROJECT_PATH}.git" HEAD:main
  when: manual       # ← 手动触发门控
  only:
    changes:
      - stage2-multi-env/**/*
    refs:
      - main
  environment:
    name: production
