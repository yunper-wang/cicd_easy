# Stage 2 Prod Overlay —— 生产环境配置
# 特点: 3 副本，高资源配额，严格资源限制
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -prod
namespace: prod
commonLabels:
  env: prod
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stage2-app
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: web
                env:
                  - name: ENV_NAME
                    value: "prod"
                resources:
                  requests:
                    cpu: "100m"
                    memory: "128Mi"
                  limits:
                    cpu: "500m"
                    memory: "256Mi"
