# Stage 2 Dev Overlay —— 开发环境配置
# 特点: 1 副本，宽松资源限制，调试模式
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -dev
namespace: dev
commonLabels:
  env: dev
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stage2-app
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: web
                env:
                  - name: ENV_NAME
                    value: "dev"
                resources:
                  requests:
                    cpu: "25m"
                    memory: "32Mi"
                  limits:
                    cpu: "100m"
                    memory: "64Mi"
